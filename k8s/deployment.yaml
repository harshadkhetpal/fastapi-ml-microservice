apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-microservice
spec:
  replicas: 3
  selector: {matchLabels: {app: ml-microservice}}
  template:
    metadata:
      labels: {app: ml-microservice}
    spec:
      containers:
        - name: api
          image: harshadkhetpal/fastapi-ml:latest
          ports: [{containerPort: 8000}]
          resources:
            requests: {cpu: 250m, memory: 512Mi}
            limits: {cpu: 1000m, memory: 2Gi}
